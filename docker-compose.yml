version: '3.8'

services:
  kyutai-stt-openai-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyutai-stt-openai-api
    ports:
      - "8080:8080"
    environment:
      - MODEL_NAME=kyutai/stt-1b-en_fr
      - PORT=8080
      - HOST=0.0.0.0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models  # Cache downloaded models
      - ./logs:/app/logs      # Store logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

